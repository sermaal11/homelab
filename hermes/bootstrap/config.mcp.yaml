# Reference only. Merge into /opt/data/config.yaml through Hermes setup/dashboard.
# Keep secrets in hermes/.env or the persistent Hermes .env, not in this file.

mcp_servers:
  homeassistant:
    url: "http://host.docker.internal:8123/api/mcp"
    headers:
      Authorization: "Bearer ${HOMEASSISTANT_TOKEN}"
    enabled: true
    timeout: 60
    connect_timeout: 15
    tools:
      include:
        - GetLiveContext
        - GetDateTime
        - todo_get_items
        - HassListAddItem
        - HassListCompleteItem
        - HassListRemoveItem
      resources: false
      prompts: false

homelab:
  prometheus_url: "http://prometheus:9090"
  grafana_url: "http://grafana:3000"
  filesystem_scope: "/opt/data/workspace"
