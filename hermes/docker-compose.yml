services:
  hermes:
    container_name: hermes
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: gateway run
    ports:
      - "${HERMES_GATEWAY_PORT:-8642}:8642"
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY:?Set HERMES_API_SERVER_KEY in hermes/.env}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      TELEGRAM_HOME_CHANNEL: ${TELEGRAM_HOME_CHANNEL:-}
      HOMEASSISTANT_TOKEN: ${HOMEASSISTANT_TOKEN:-}
      GRAFANA_URL: ${GRAFANA_URL:-http://grafana:3000}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
      TZ: ${TZ:-Europe/Madrid}
    volumes:
      - ${HERMES_DATA_DIR:-/data/homelab/hermes/data}:/opt/data
    networks:
      - default
      - server-monitoring

  honcho-api:
    container_name: honcho-api
    profiles:
      - honcho
    build:
      context: https://github.com/plastic-labs/honcho.git#${HONCHO_GIT_REF:-main}
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    ports:
      - "${HONCHO_API_BIND:-127.0.0.1}:${HONCHO_API_PORT:-8000}:8000"
    environment: &honcho-environment
      DB_CONNECTION_URI: postgresql+psycopg://postgres:${HONCHO_POSTGRES_PASSWORD:-postgres}@honcho-db:5432/postgres
      CACHE_URL: redis://honcho-redis:6379/0?suppress=true
      CACHE_ENABLED: "true"
      AUTH_USE_AUTH: ${HONCHO_AUTH_USE_AUTH:-false}
      LOG_LEVEL: ${HONCHO_LOG_LEVEL:-INFO}
      LLM_OPENAI_API_KEY: ${GROQ_API_KEY:-}
      EMBED_MESSAGES: ${HONCHO_EMBED_MESSAGES:-false}
      VECTOR_STORE_TYPE: pgvector
      VECTOR_STORE_MIGRATED: "false"
      DERIVER_MODEL_CONFIG__TRANSPORT: openai
      DERIVER_MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      SUMMARY_MODEL_CONFIG__TRANSPORT: openai
      SUMMARY_MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT: openai
      DREAM_DEDUCTION_MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT: openai
      DREAM_INDUCTION_MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT: openai
      DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT: openai
      DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT: openai
      DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT: openai
      DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      DIALECTIC_LEVELS__max__MODEL_CONFIG__TRANSPORT: openai
      DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL: ${HONCHO_GROQ_MODEL:-llama-3.3-70b-versatile}
      DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - default

  honcho-deriver:
    container_name: honcho-deriver
    profiles:
      - honcho
    build:
      context: https://github.com/plastic-labs/honcho.git#${HONCHO_GIT_REF:-main}
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      honcho-api:
        condition: service_healthy
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    environment:
      <<: *honcho-environment
    networks:
      - default

  honcho-db:
    container_name: honcho-db
    profiles:
      - honcho
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${HONCHO_POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${HONCHO_POSTGRES_DATA_DIR:-/data/homelab/hermes/honcho/postgres}:/var/lib/postgresql/data
      - ./honcho/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  honcho-redis:
    container_name: honcho-redis
    profiles:
      - honcho
    image: redis:8.2
    restart: unless-stopped
    volumes:
      - ${HONCHO_REDIS_DATA_DIR:-/data/homelab/hermes/honcho/redis}:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  server-monitoring:
    name: server-monitoring
    external: true
