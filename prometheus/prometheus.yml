global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "service-health"
    metrics_path: /probe
    params:
      module: [http_service]
    static_configs:
      - targets: ["http://host.docker.internal:8123"]
        labels:
          service: "Home Assistant"
      - targets: ["http://grafana:3000/api/health"]
        labels:
          service: "Grafana"
      - targets: ["http://prometheus:9090/-/ready"]
        labels:
          service: "Prometheus"
      - targets: ["http://adguard"]
        labels:
          service: "AdGuard Home"
      - targets: ["http://passbolt"]
        labels:
          service: "Passbolt"
      - targets: ["https://portainer:9443"]
        labels:
          service: "Portainer"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
