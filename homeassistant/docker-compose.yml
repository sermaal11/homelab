services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: ${TZ:-Europe/Madrid}
    volumes:
      - /run/dbus:/run/dbus:ro
      - ${HOMEASSISTANT_CONFIG_DIR:-/data/homelab/homeassistant}:/config
